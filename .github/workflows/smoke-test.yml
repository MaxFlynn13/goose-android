name: Smoke Test APK

# Builds the Android app with a placeholder goose binary.
# Validates Kotlin compilation, Compose UI, and service lifecycle.
# The real goose binary comes from the full build workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-smoke-apk:
    name: Build Smoke Test APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Create placeholder native lib
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # Minimal ELF header so APK packaging doesn't complain
          printf '\x7fELF' > app/src/main/jniLibs/arm64-v8a/libgoose.so

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload smoke test APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-smoke-test
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
