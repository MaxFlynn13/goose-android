name: Smoke Test APK (No Goose Binary)

# Builds a minimal APK to validate the Android app shell compiles and runs.
# Does NOT include the goose Rust binary — shows a diagnostic page instead.
# Use this for rapid iteration on the Android/Kotlin side.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-smoke-apk:
    name: Build Smoke Test APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Create placeholder frontend
        run: |
          mkdir -p app/src/main/assets/web
          cat > app/src/main/assets/web/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Goose Android - Smoke Test</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                      background: #1a1a2e;
                      color: #e0e0e0;
                      min-height: 100vh;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      justify-content: center;
                      padding: 2rem;
                  }
                  .container { text-align: center; max-width: 400px; }
                  h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #ff6b35; }
                  h2 { font-size: 1.2rem; font-weight: 400; margin-bottom: 2rem; color: #aaa; }
                  .status {
                      background: #2a2a4a;
                      border-radius: 12px;
                      padding: 1.5rem;
                      margin-bottom: 1.5rem;
                      text-align: left;
                  }
                  .status-item {
                      display: flex;
                      justify-content: space-between;
                      padding: 0.5rem 0;
                      border-bottom: 1px solid #333;
                  }
                  .status-item:last-child { border-bottom: none; }
                  .check { color: #4caf50; }
                  .warn { color: #ff9800; }
                  .fail { color: #f44336; }
                  .info { font-size: 0.85rem; color: #888; margin-top: 1rem; }
                  button {
                      margin-top: 1rem;
                      padding: 0.75rem 2rem;
                      background: #ff6b35;
                      color: white;
                      border: none;
                      border-radius: 8px;
                      font-size: 1rem;
                      cursor: pointer;
                  }
                  button:active { background: #e55a25; }
                  #log {
                      margin-top: 1.5rem;
                      background: #111;
                      border-radius: 8px;
                      padding: 1rem;
                      text-align: left;
                      font-family: monospace;
                      font-size: 0.75rem;
                      max-height: 200px;
                      overflow-y: auto;
                      color: #0f0;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🪿 Goose</h1>
                  <h2>Android Smoke Test</h2>
                  <div class="status">
                      <div class="status-item">
                          <span>WebView</span>
                          <span class="check">✓ Working</span>
                      </div>
                      <div class="status-item">
                          <span>JavaScript Bridge</span>
                          <span id="s-bridge">checking...</span>
                      </div>
                      <div class="status-item">
                          <span>Platform</span>
                          <span id="s-platform">detecting...</span>
                      </div>
                      <div class="status-item">
                          <span>Goose Port</span>
                          <span id="s-port">—</span>
                      </div>
                      <div class="status-item">
                          <span>WebSocket</span>
                          <span id="s-ws">not tested</span>
                      </div>
                  </div>
                  <button onclick="testConnection()">Test WebSocket</button>
                  <button onclick="testBridge()">Test Bridge</button>
                  <div id="log"></div>
                  <p class="info">
                      Smoke test build. Full UI replaces this once Rust binary compiles.
                  </p>
              </div>
              <script>
                  function log(msg) {
                      var el = document.getElementById('log');
                      el.innerHTML += new Date().toLocaleTimeString() + ' ' + msg + '\n';
                      el.scrollTop = el.scrollHeight;
                  }
                  function testBridge() {
                      var el = document.getElementById('s-bridge');
                      if (window.AndroidBridge) {
                          el.textContent = '✓ Connected';
                          el.className = 'check';
                          log('Bridge: platform=' + AndroidBridge.getPlatform());
                          log('Bridge: arch=' + AndroidBridge.getArch());
                          log('Bridge: version=' + AndroidBridge.getVersion());
                      } else {
                          el.textContent = '✗ Not found';
                          el.className = 'fail';
                          log('AndroidBridge not available');
                      }
                  }
                  function testConnection() {
                      var el = document.getElementById('s-ws');
                      var port = window.GOOSE_PORT || 3284;
                      var url = 'ws://127.0.0.1:' + port + '/acp';
                      log('Connecting to ' + url);
                      el.textContent = 'connecting...';
                      el.className = 'warn';
                      try {
                          var ws = new WebSocket(url);
                          ws.onopen = function() {
                              el.textContent = '✓ Connected!';
                              el.className = 'check';
                              log('WebSocket open - goose is running!');
                              ws.close();
                          };
                          ws.onerror = function() {
                              el.textContent = '✗ No server';
                              el.className = 'fail';
                              log('Expected in smoke test (no binary)');
                          };
                          setTimeout(function() {
                              if (ws.readyState === 0) { ws.close(); el.textContent = '✗ Timeout'; el.className = 'fail'; }
                          }, 5000);
                      } catch(e) { el.textContent = '✗ Error'; el.className = 'fail'; log(e.message); }
                  }
                  (function() {
                      var p = document.getElementById('s-platform');
                      var port = document.getElementById('s-port');
                      p.textContent = window.GOOSE_PLATFORM || 'browser';
                      p.className = window.GOOSE_PLATFORM ? 'check' : 'warn';
                      port.textContent = window.GOOSE_PORT || 'not set';
                      port.className = window.GOOSE_PORT ? 'check' : 'warn';
                      setTimeout(testBridge, 500);
                  })();
              </script>
          </body>
          </html>
          HTMLEOF

      - name: Create placeholder native lib
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # Create a minimal ELF binary placeholder (not functional, just lets APK build)
          printf '\x7fELF' > app/src/main/jniLibs/arm64-v8a/libgoose.so

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload smoke test APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-smoke-test
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
