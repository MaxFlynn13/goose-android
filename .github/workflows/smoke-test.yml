name: Smoke Test APK

# Builds the Android app with a placeholder goose binary.
# Validates Kotlin compilation, Compose UI, and service lifecycle.
# The real goose binary comes from the full build workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-smoke-apk:
    name: Build Smoke Test APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Create placeholder native lib
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # Minimal ELF header so APK packaging doesn't complain
          printf '\x7fELF' > app/src/main/jniLibs/arm64-v8a/libgoose.so

      - name: Bundle BusyBox for runtime tools
        run: |
          mkdir -p app/src/main/assets
          # Download static BusyBox for arm64
          wget -q "https://busybox.net/downloads/binaries/1.35.0-arm64-linux-musl/busybox" \
            -O app/src/main/assets/busybox-arm64 || \
          wget -q "https://github.com/nicoulaj/busybox-static/releases/download/1.36.1/busybox-arm64" \
            -O app/src/main/assets/busybox-arm64 || \
          echo "BusyBox download failed — will work without runtime tools"
          # Make it executable in the asset (metadata only, actual chmod happens at runtime)
          [ -f app/src/main/assets/busybox-arm64 ] && chmod +x app/src/main/assets/busybox-arm64

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload smoke test APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-smoke-test
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
