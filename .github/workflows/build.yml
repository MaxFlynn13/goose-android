name: Build Goose Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GOOSE_VERSION: "1.33.0"
  GOOSE_REPO: "https://github.com/block/goose.git"
  GOOSE_REF: "main"

jobs:
  build-goose-binary:
    name: Cross-compile Goose for Android (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Goose source
        run: |
          git clone --depth 1 --branch ${{ env.GOOSE_REF }} ${{ env.GOOSE_REPO }} goose-src

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            goose-src/target
          key: ${{ runner.os }}-cargo-android-arm64-${{ hashFiles('goose-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-arm64-

      - name: Apply Android patches
        run: |
          chmod +x scripts/patch-goose-build.sh
          ./scripts/patch-goose-build.sh goose-src

      - name: Build goose binary for Android arm64
        run: |
          cd goose-src
          # local-inference excluded: LiteRT handles on-device models natively
          # code-mode excluded: V8 cross-compilation too complex for Android
          # aws-providers excluded: not needed for mobile
          cross build --release -p goose-cli \
            --target aarch64-linux-android \
            --no-default-features \
            --features "rustls-tls,telemetry,disable-update"

      - name: Strip and rename binary
        run: |
          STRIP=$(find ${ANDROID_NDK_HOME:-/usr/local/lib/android/sdk/ndk} -name "llvm-strip" 2>/dev/null | head -1)
          if [ -z "$STRIP" ]; then
            echo "Warning: llvm-strip not found, using generic strip"
            STRIP="strip"
          fi

          cp goose-src/target/aarch64-linux-android/release/goose libgoose.so
          $STRIP libgoose.so || echo "Strip failed (non-fatal)"

          echo "Binary info:"
          ls -lh libgoose.so
          file libgoose.so

      - name: Upload goose binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: goose-binary-arm64
          path: libgoose.so
          retention-days: 7

  build-frontend:
    name: Build Goose Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Goose source
        run: |
          git clone --depth 1 --branch ${{ env.GOOSE_REF }} ${{ env.GOOSE_REPO }} goose-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: |
          cd goose-src/ui
          pnpm install --frozen-lockfile

      - name: Build SDK
        run: |
          cd goose-src/ui/sdk
          pnpm build

      - name: Build goose2 frontend
        run: |
          cd goose-src/ui/goose2
          echo "VITE_PLATFORM=android" >> .env
          pnpm build

      - name: Patch frontend for Android
        run: |
          chmod +x scripts/patch-frontend.sh
          ./scripts/patch-frontend.sh goose-src frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: goose-frontend
          path: goose-src/ui/goose2/dist/
          retention-days: 7

  build-apk:
    name: Assemble Android APK
    runs-on: ubuntu-latest
    needs: [build-goose-binary, build-frontend]
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download goose binary
        uses: actions/download-artifact@v4
        with:
          name: goose-binary-arm64
          path: app/src/main/jniLibs/arm64-v8a/

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: goose-frontend
          path: app/src/main/assets/web/

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
