name: Build Goose Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GOOSE_REPO: "https://github.com/block/goose.git"
  GOOSE_REF: "main"
  ANDROID_API_LEVEL: "34"

jobs:
  build-goose-binary:
    name: Cross-compile Goose for Android (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Goose source
        run: |
          git clone --depth 1 --branch ${{ env.GOOSE_REF }} ${{ env.GOOSE_REPO }} goose-src

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Ensure NDK is available
        run: |
          # Use the NDK already on the runner
          if [ -n "$ANDROID_NDK_ROOT" ] && [ -d "$ANDROID_NDK_ROOT" ]; then
            echo "Using NDK at: $ANDROID_NDK_ROOT"
          elif [ -d "$ANDROID_HOME/ndk" ]; then
            ANDROID_NDK_ROOT=$(ls -d $ANDROID_HOME/ndk/*/ 2>/dev/null | sort -V | tail -1 | sed 's:/$::')
            echo "Found NDK at: $ANDROID_NDK_ROOT"
          else
            echo "Installing NDK..."
            sdkmanager --install "ndk;27.2.12479018"
            ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/27.2.12479018"
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

          # Verify the toolchain exists
          ls "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -5

      - name: Install Rust toolchain matching goose project
        run: |
          cd goose-src

          # Read the toolchain version from the project's rust-toolchain.toml
          if [ -f "rust-toolchain.toml" ]; then
            echo "=== Project rust-toolchain.toml ==="
            cat rust-toolchain.toml
            echo ""
          fi

          # Install whatever toolchain the project needs + add Android target
          rustup show
          rustup target add aarch64-linux-android

          # Verify the target is installed
          rustup target list --installed | grep android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            goose-src/target
          key: ${{ runner.os }}-cargo-android-arm64-v3-${{ hashFiles('goose-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-arm64-v3-

      - name: Patch goose source for Android
        run: |
          cd goose-src

          # 1. The keyring crate on Linux needs dbus/secret-service.
          #    On Android (target_os = "android"), this section doesn't apply
          #    because cfg(target_os = "linux") != cfg(target_os = "android").
          #    But let's verify and patch if needed.
          echo "=== Checking target-specific deps ==="
          grep -n 'target.*linux' crates/goose/Cargo.toml || true
          grep -n 'target.*android' crates/goose/Cargo.toml || true

          # 2. arboard (clipboard) - check if it compiles for Android
          #    arboard uses android-clipboard on Android, should be fine
          echo "=== arboard config ==="
          grep -A2 "arboard" crates/goose/Cargo.toml || true

          # 3. Disable the rust-toolchain.toml components that might interfere
          #    (like rustfmt, clippy) - we only need the compiler
          if [ -f "rust-toolchain.toml" ]; then
            # Keep channel but strip components that aren't needed for build
            echo "=== Original rust-toolchain.toml ==="
            cat rust-toolchain.toml
          fi

      - name: Configure cargo for Android cross-compilation
        run: |
          cd goose-src

          NDK_TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          API=${{ env.ANDROID_API_LEVEL }}

          # Create .cargo/config.toml for the Android target
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API}-clang"
          ar = "${NDK_TOOLCHAIN}/bin/llvm-ar"

          [env]
          CC_aarch64_linux_android = "${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API}-clang"
          CXX_aarch64_linux_android = "${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API}-clang++"
          AR_aarch64_linux_android = "${NDK_TOOLCHAIN}/bin/llvm-ar"
          RANLIB_aarch64_linux_android = "${NDK_TOOLCHAIN}/bin/llvm-ranlib"
          EOF

          echo "=== .cargo/config.toml ==="
          cat .cargo/config.toml

          # Verify linker exists
          ls -la "${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API}-clang"

      - name: Build goose binary for Android arm64
        env:
          # Ensure pkg-config doesn't try to find host libraries
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_SYSROOT_DIR: ""
          # Disable keyring at build time (uses file-based secrets on Android)
          GOOSE_DISABLE_KEYRING: "true"
          # Ring crate needs these for cross-compilation
          TARGET_CC: "${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang"
          TARGET_AR: "${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
        run: |
          cd goose-src

          NDK_TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          API=${{ env.ANDROID_API_LEVEL }}

          # Export env vars that various -sys crates need
          export CC_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API}-clang"
          export CXX_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API}-clang++"
          export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/llvm-ar"
          export RANLIB_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/llvm-ranlib"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API}-clang"

          # Build with minimal features for Android
          # - rustls-tls: pure Rust TLS (no OpenSSL needed)
          # - telemetry: basic telemetry
          # - disable-update: no auto-updater on Android
          # EXCLUDED: code-mode (V8), local-inference (llama.cpp), aws-providers
          cargo build --release \
            --target aarch64-linux-android \
            -p goose-cli \
            --no-default-features \
            --features "rustls-tls,telemetry,disable-update" \
            2>&1 | tee build.log | tail -50

          # Check if build succeeded
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "Last 100 lines of build log:"
            tail -100 build.log
            exit 1
          fi

      - name: Strip and package binary
        run: |
          BINARY="goose-src/target/aarch64-linux-android/release/goose"
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found, searching..."
            find goose-src/target/aarch64-linux-android -name "goose" -type f 2>/dev/null | head -10
            exit 1
          fi

          NDK_TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          cp "$BINARY" libgoose.so
          "${NDK_TOOLCHAIN}/bin/llvm-strip" libgoose.so || echo "Strip failed (non-fatal)"

          echo "=== Binary info ==="
          ls -lh libgoose.so
          file libgoose.so

      - name: Upload goose binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: goose-binary-arm64
          path: libgoose.so
          retention-days: 7

  build-apk:
    name: Assemble Android APK
    runs-on: ubuntu-latest
    needs: [build-goose-binary]
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download goose binary
        uses: actions/download-artifact@v4
        with:
          name: goose-binary-arm64
          path: app/src/main/jniLibs/arm64-v8a/

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
