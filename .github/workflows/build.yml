name: Build Goose Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GOOSE_REPO: "https://github.com/block/goose.git"
  GOOSE_REF: "main"
  ANDROID_API_LEVEL: "34"

jobs:
  build-goose-binary:
    name: Cross-compile Goose for Android (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Goose source
        run: |
          git clone --depth 1 --branch ${{ env.GOOSE_REF }} ${{ env.GOOSE_REPO }} goose-src

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk || true

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: |
          # Use whatever NDK is already installed on the runner
          # cargo-ndk will find it via ANDROID_NDK_ROOT or ANDROID_NDK_HOME
          if [ -n "$ANDROID_NDK_ROOT" ]; then
            echo "Using existing NDK at: $ANDROID_NDK_ROOT"
            echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          elif [ -d "$ANDROID_HOME/ndk" ]; then
            NDK_DIR=$(ls -d $ANDROID_HOME/ndk/*/ 2>/dev/null | sort -V | tail -1)
            echo "Found NDK at: $NDK_DIR"
            echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
            echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          else
            echo "No NDK found, installing latest..."
            sdkmanager --install "ndk;27.2.12479018"
            echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            goose-src/target
          key: ${{ runner.os }}-cargo-ndk-arm64-${{ hashFiles('goose-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ndk-arm64-

      - name: Analyze and patch goose source
        run: |
          chmod +x scripts/patch-goose-build.sh
          ./scripts/patch-goose-build.sh goose-src

      - name: Build goose binary for Android arm64
        run: |
          cd goose-src

          # Setup the NDK toolchain for Rust cross-compilation
          # This avoids cargo-ndk which has panic bugs with certain toolchain configs
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export CC_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang"
          export CXX_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang++"
          export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/llvm-ar"
          export RANLIB_aarch64_linux_android="${NDK_TOOLCHAIN}/bin/llvm-ranlib"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang"

          echo "CC: $CC_aarch64_linux_android"
          ls -la "$CC_aarch64_linux_android" || echo "CC not found!"

          # Build directly with cargo (no cargo-ndk wrapper needed)
          cargo build --release -p goose-cli \
            --target aarch64-linux-android \
            --no-default-features \
            --features "rustls-tls,telemetry,disable-update"

      - name: Strip and package binary
        run: |
          # Find the built binary
          BINARY="goose-src/target/aarch64-linux-android/release/goose"
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found at expected path, searching..."
            find goose-src/target -name "goose" -type f | head -10
            exit 1
          fi

          # Strip with NDK's llvm-strip
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          STRIP="${NDK_TOOLCHAIN}/bin/llvm-strip"
          cp "$BINARY" libgoose.so
          "$STRIP" libgoose.so || echo "Strip failed (non-fatal)"

          echo "=== Binary info ==="
          ls -lh libgoose.so
          file libgoose.so

      - name: Upload goose binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: goose-binary-arm64
          path: libgoose.so
          retention-days: 7

  build-apk:
    name: Assemble Android APK
    runs-on: ubuntu-latest
    needs: [build-goose-binary]
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download goose binary
        uses: actions/download-artifact@v4
        with:
          name: goose-binary-arm64
          path: app/src/main/jniLibs/arm64-v8a/

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
