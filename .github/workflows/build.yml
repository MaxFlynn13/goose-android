name: Build Goose Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Bundle BusyBox
        run: |
          mkdir -p app/src/main/assets
          # Download static BusyBox for ARM64
          curl -L -o app/src/main/assets/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox" \
            || curl -L -o app/src/main/assets/busybox \
            "https://github.com/nicoulaj/nicoulaj.github.io/releases/download/busybox-v1/busybox-arm64" \
            || echo "BusyBox download failed — will use system tools only"
          [ -f app/src/main/assets/busybox ] && chmod +x app/src/main/assets/busybox || true

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
